<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha Película</title>
    <link rel="stylesheet" th:href="@{/estiloBorrar.css}">
    <link rel="stylesheet" th:href="@{/estiloNavbar.css}">




</head>

<body>
<span th:replace="fragment_navbar :: navBar"></span>
<div class="container">
<!--
    <div class="poster">
        <img th:src="${pelicula.imgUrl}" alt="Poster de la película">
    </div>
-->
    <div class="info">
        <div class="title-wrapper">
            <h1 th:text="${pelicula.titulo}">Título</h1>

            <div class="rating-badge" th:if="${mediaRating != null and mediaRating > 0}">
                <span class="star">★</span>
                <span th:text="${#numbers.formatDecimal(mediaRating, 1, 1)}">0.0</span>
            </div>
        </div>

        <p><strong>Director:</strong> <span th:text="${pelicula.director}">Director</span></p>
        <p><strong>Año:</strong> <span th:text="${pelicula.anyo}">Año</span></p>
        <p><strong>Género:</strong> <span th:text="${pelicula.genero?.nombre}">Genero</span></p>

        <p th:if="${pelicula.descripcion != null and !#strings.isEmpty(pelicula.descripcion)}">
            <strong>Descripción:</strong> <span th:text="${pelicula.descripcion}">Descripción</span>
        </p>

       <!-- <p>
            <strong>ID:</strong>
            <span th:text="${pelicula.id}">1</span>
        </p>-->
        <div class="video-container">
            <iframe width="560" height="315" th:src="'https://www.youtube.com/embed/' + ${pelicula?.videoUrl}"
                    title="YouTube video player"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>

            </iframe>
        </div>

        <!--
                    <a th:href="${pelicula.videoUrl}" target="_blank">
                        <button class="play">▶ Ver trailer</button>
                    </a>
        -->

        <div class="buttons">


           <!-- <form th:action="@{/deleteMovie/{id}(id=${pelicula.id})}" method="post">
                <button class="delete">Borrar película</button>
            </form>-->


        </div>
        <div class="reviews-container">

            <h3 class="reviews-title" th:if="${reviews != null and !reviews.isEmpty()}">
                VALORACIONES
            </h3>
            <div th:each="review : ${reviews}" class="review-card">

                <div class="review-header">
                    <div class="user-info">
                        <span class="user-name" th:text="${review.usuario.username}"></span>
                        <span class="user-email" th:text="${review.usuario.email}"></span>
                    </div>

                    <div class="rating">
                <span th:each="i : ${#numbers.sequence(1,5)}"
                      th:text="${i <= review.rating} ? '★' : '☆'">
                </span>
                    </div>
                </div>

                <p class="review-content" th:text="${review.contenido}"></p>

                <span class="review-date"
                      th:text="${#temporals.format(review.createdAt, 'dd/MM/yyyy')}">
        </span>

            </div>

        </div>

    </div>

</div>
<!--esto solo se carga si el usuario esta logueado-->

<div  class="reviews-container"  sec:authorize="isAuthenticated()">
    <div class="reviews-container" sec:authorize="isAnonymous()">
        <p>Debes <a th:href="@{/login}">iniciar sesión</a> para añadir una reseña.</p>
    </div>

    <!-- Formulario para añadir nueva review -->
    <h3 class="reviews-title" th:if="${reviews.isEmpty()}">
        SE EL PRIMERO EN AÑADIR UNA RESEÑA
    </h3>
   <h3 class="reviews-title" th:if="${reviews != null and !reviews.isEmpty()}">AÑADE UNA RESEÑA</h3>
    <form th:action="@{/addReview}" method="post" class="review-form">
        <input type="hidden" name="peliculaId" th:value="${pelicula.id}" />

        <div class="form-group">
            <label for="contenido">Comentario:</label>
            <textarea name="contenido" id="contenido" rows="3" required></textarea>
        </div>

        <div class="form-group rating-group">
            <label>Valoración:</label>
            <div class="stars">
                <input type="radio" id="star5" name="rating" value="5" required />
                <label for="star5" title="5 estrellas">★</label>

                <input type="radio" id="star4" name="rating" value="4" />
                <label for="star4" title="4 estrellas">★</label>

                <input type="radio" id="star3" name="rating" value="3" />
                <label for="star3" title="3 estrellas">★</label>

                <input type="radio" id="star2" name="rating" value="2" />
                <label for="star2" title="2 estrellas">★</label>

                <input type="radio" id="star1" name="rating" value="1" />
                <label for="star1" title="1 estrella">★</label>
            </div>
        </div>

        <button type="submit" class="btnEnvio">Enviar reseña</button>
    </form>
</div>

</body>
</html>
