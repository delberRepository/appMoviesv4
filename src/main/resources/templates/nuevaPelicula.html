<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alta Película</title>

    <link rel="stylesheet" th:href="@{/estiloNueva.css}">
    <link rel="stylesheet" th:href="@{/estiloNavbar.css}">


</head>

<body>
<span th:replace="fragment_navbar :: navBar"></span>
<form th:action="@{/createMovie}" th:object="${pelicula}" method="post" class="formulario">

    <h2>Alta de Película</h2>

    <input type="text"
           placeholder="Título"
           th:field="*{titulo}">

    <input type="text"
           placeholder="Director"
           th:field="*{director}">

    <input type="text"
           placeholder="URL de imagen"
           th:field="*{imgUrl}">

    <input type="text"
           placeholder="URL video"
           th:field="*{videoUrl}">

    <textarea placeholder="Descripción"
              th:field="*{descripcion}"
              rows="4"></textarea>
    <!-- Campo género -->
    <select th:field="*{genero}">
        <option value="">Selecciona un género</option>

        <option th:each="g : ${generos}"
                th:value="${g.id}"
                th:text="${g.nombre}">
        </option>

    </select>

    <button  class= "btnGuardar" type="submit">Guardar</button>

</form>

</body>
</html>
