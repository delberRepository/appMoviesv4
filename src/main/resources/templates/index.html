<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Películas</title>
    <link rel="stylesheet" th:href="@{/estiloIndex.css}">
    <link rel="stylesheet" th:href="@{/estiloNavbar.css}">
</head>

<body>
<span th:replace="fragment_navbar :: navBar"></span>

<header>
    <div class="logo">RETROMOVIES</div>

    <div class="search-bar">
        <form th:action="@{/searchMovie}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <!--Aqui le estoy pasando un parametro con el numero de pelis que estan cargadas-->
            <button class="btnCount" th:text="${#lists.size(peliculas)}"></button>
            <select name="searchGenero">
                <option value="0">Todos los géneros</option>

                <option th:each="g : ${generos}"
                        th:value="${g.id}"
                        th:text="${g.nombre}">
                </option>
            </select>

            <input type="text" placeholder="Buscar por título" name="searchTitle">

            <button>Buscar</button>


        </form>

        <a th:href="@{/createMovie}" class="btnCrear"  sec:authorize="isAuthenticated()">Nueva película</a>

    </div>


</header>

<div class="container">
    <div class="grid">
        <div class="card" th:each="p : ${peliculas}">

            <a th:href="@{/verFicha/{id}(id=${p.id})}">
                <img th:src="${p.imgUrl}" alt="poster pelicula">
            </a>

            <div class="card-content">
                <div class="card-header">
                    <div class="card-title" th:text="${p.titulo}">Título de la película</div>

                    <div class="card-note" th:if="${p.mediaRatingFormateada != ' '}">
                        <span class="star" >★</span>
                        <span th:text="${p.mediaRatingFormateada}">5</span>
                    </div>
                </div>

                <a th:href="@{/verFicha/{id}(id=${p.id})}" class="btn">
                    Ver ficha
                </a>
            </div>
    </div>
</div>

</body>
</html>
