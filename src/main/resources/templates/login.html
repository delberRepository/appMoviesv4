<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/estiloLogin.css}">
    <link rel="stylesheet" th:href="@{/estiloNavbar.css}">
    
</head>
<body>
<span th:replace="fragment_navbar :: navBar"></span>
<div class="card_login">
<h2>Iniciar sesión</h2>

<form th:action="@{/login}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <div>
        <label>Usuario:</label>
        <input type="text" name="username" />
    </div>

    <div>
        <label>Contraseña:</label>
        <input type="password" name="password" />
    </div>

    <button type="submit" class="botonRojo">Entrar</button>
</form>
    <div class="extra">
        ¿No tienes cuenta? <a th:href="@{/register}">Crear cuenta</a>
    </div>
</div>

</body>
</html>
